<style>
  :root{
    --bg:#1e2536; --panel:#28304a; --accent:#4e8dd8; --accent2:#6ba8e8;
    --text:#d4dae6; --muted:#7d8aa3; --entry:#323c52; --danger:#d95f5f;
    --row-odd:#222a40; --row-even:#28304a; --ok:#4caf72;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Georgia,serif;}
  body{padding:env(safe-area-inset-top) 0 24px; min-height:100vh;}

  .appbar{position:sticky;top:0;z-index:5;background:#1a2030;
    padding:10px 14px;border-bottom:1px solid #2a3450;
    padding-top:calc(10px + env(safe-area-inset-top));}
  .appbar .title{font-size:18px;font-weight:bold;color:var(--accent2);
    letter-spacing:.5px;margin-bottom:8px;}
  .userrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  #userSelect{flex:1 1 auto;min-width:120px;background:var(--entry);color:var(--accent2);
    border:1px solid #2f3a52;border-radius:8px;padding:9px 10px;font-size:16px;font-weight:bold;}
  .iconbtn{background:var(--entry);color:var(--text);border:1px solid #2f3a52;
    border-radius:8px;padding:9px 11px;font-size:15px;min-height:40px;}
  .cloud{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);width:100%;margin-top:2px;}
  .cloud-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex:0 0 auto;}
  .cloud-dot.synced{background:var(--ok);}
  .cloud-dot.syncing{background:#d9a441;}
  .cloud-dot.offline{background:#6b7a94;}
  .cloud-dot.error{background:var(--danger);}
  #cloudEmail{color:var(--accent2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #btnSignOut{margin-left:auto;}

  main{padding:14px;display:flex;flex-direction:column;gap:14px;max-width:560px;margin:0 auto;}
  .card{background:var(--panel);border-radius:12px;padding:14px;border:1px solid #2a3450;}
  .card h2{margin:0 0 12px;font-size:15px;color:var(--accent);text-transform:uppercase;
    letter-spacing:1px;border-bottom:1px solid #3a4560;padding-bottom:7px;text-align:center;}
  #entryCard h2{cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;user-select:none;}
  #entryCard h2 .caret{font-size:11px;color:var(--muted);transition:transform .15s ease;}
  #entryCard.collapsed h2{margin-bottom:0;border-bottom:none;padding-bottom:0;}
  #entryCard.collapsed h2 .caret{transform:rotate(-90deg);}
  #entryCard.collapsed > :not(h2){display:none;}

  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 3px;}
  input{width:100%;background:var(--entry);border:1px solid #2f3a52;border-radius:8px;
    color:var(--text);font-size:16px;padding:11px 12px;outline:none;}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(78,141,216,.35);}
  input[readonly]{background:#252c3e;color:var(--accent2);font-weight:bold;text-align:center;}
  .card select{width:100%;background:var(--entry);color:var(--accent2);border:1px solid #2f3a52;
    border-radius:8px;padding:11px 12px;font-size:16px;font-weight:bold;margin-bottom:4px;}

  .gauge-list{margin-top:12px;display:flex;flex-direction:column;gap:10px;}
  .grow{background:var(--entry);border-radius:10px;padding:10px;}
  .grow .gname{font-size:14px;font-weight:bold;color:var(--accent2);margin-bottom:7px;}
  .gfields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .fld{display:flex;flex-direction:column;}
  .fld .flab{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;text-align:center;}
  .fld input{padding:10px 4px;text-align:center;background:#2b3548;}

  .btn-row{display:flex;gap:10px;margin-top:14px;}
  button.act{flex:1;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:bold;
    letter-spacing:.5px;min-height:50px;}
  button.primary{background:var(--accent);color:#fff;}
  button.ghost{background:var(--entry);color:var(--text);border:1px solid #2f3a52;}
  button:active{filter:brightness(1.15);}
  .status{margin-top:10px;font-size:13px;min-height:18px;text-align:center;color:var(--muted);}
  .status.err{color:var(--danger);}
  .status.ok{color:var(--ok);}

  table.standing{width:100%;border-collapse:collapse;font-size:15px;}
  table.standing th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
    padding:6px 8px;text-align:right;border-bottom:1px solid #3a4560;}
  table.standing th:first-child{text-align:left;}
  table.standing td{padding:9px 8px;border-bottom:1px solid #232b40;}
  table.standing td.g{font-weight:bold;color:var(--text);}
  table.standing td.avg{text-align:right;color:var(--accent2);font-variant-numeric:tabular-nums;}
  table.standing td.cls{text-align:right;font-weight:bold;color:var(--text);width:64px;}
  table.standing tr.hoa td,table.standing tr.haa td{border-top:2px solid #3a4560;color:var(--muted);}
  table.standing tr.hoa td.g,table.standing tr.haa td.g{color:var(--accent);}

  /* Overlays */
  .overlay{position:fixed;inset:0;background:rgba(10,14,22,.78);display:none;
    align-items:center;justify-content:center;padding:16px;z-index:50;}
  .overlay.show{display:flex;}
  .modal{background:var(--panel);border-radius:14px;padding:18px;width:100%;max-width:380px;
    border:1px solid #38445f;}
  .modal h2{margin:0 0 10px;font-size:17px;color:var(--accent2);}
  .modal .intro{font-size:13px;color:var(--muted);margin:0 0 12px;line-height:1.5;}
  .modal .msg{min-height:18px;font-size:12px;color:var(--accent2);margin:4px 0 6px;}
  .modal .msg.err{color:var(--danger);}
  .modal-btns{display:flex;gap:10px;margin-top:14px;}
  .modal-btns button{flex:1;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:bold;min-height:48px;}
  .modal-btns .b-primary{background:var(--accent);color:#fff;}
  .modal-btns .b-ghost{background:var(--entry);color:var(--text);border:1px solid #2f3a52;}
  .modal-links{margin-top:10px;font-size:13px;text-align:center;}
  .modal-links a{color:var(--accent2);text-decoration:none;}
  .del-link{display:block;text-align:center;margin-top:12px;color:var(--danger);font-size:13px;background:none;border:none;width:100%;}
</style>
</head>
<body>

  <header class="appbar">
    <div class="title">Skeet Score Avg and Class &mdash; Mobile</div>
    <div class="userrow">
      <select id="userSelect" title="Shooter"></select>
      <button class="iconbtn" id="btnEditUser" title="Edit profile">&#9881;</button>
      <button class="iconbtn" id="btnAddUser" title="Add shooter">+</button>
      <button class="iconbtn" id="btnSignOut" title="Sign out" style="display:none">Sign Out</button>
      <span class="cloud" title="Sync status">
        <span class="cloud-dot offline" id="cloudStatus"></span>
        <span id="cloudStatusText"></span>
        <span id="cloudEmail"></span>
      </span>
    </div>
  </header>

  <main>
    <section class="card" id="standingCard">
      <h2>Current Standing</h2>
      <table class="standing" id="standingTable">
        <thead><tr><th></th><th>Average</th><th>Next&nbsp;Class</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="card" id="entryCard">
      <h2 id="entryHeader">New Entry <span class="caret">&#9662;</span></h2>
      <label for="inDate">Date</label>
      <input id="inDate" inputmode="numeric" autocomplete="off" placeholder="MM/DD/YYYY">
      <label for="inClub">Club / Shoot</label>
      <input id="inClub" autocomplete="off" placeholder="Club or shoot name">
      <div class="gauge-list" id="gaugeList"></div>
      <div class="btn-row">
        <button class="act primary" id="btnSave">Save</button>
        <button class="act ghost" id="btnClear">Clear</button>
      </div>
      <div class="status" id="statusLabel"></div>
    </section>

    <section class="card" id="editCard">
      <h2>Edit History</h2>
      <label for="editSelect">Select Entry &mdash; this year (by date, club)</label>
      <select id="editSelect"><option value="">&mdash; Select an entry &mdash;</option></select>
      <div id="editForm" style="display:none">
        <label for="edDate">Date</label>
        <input id="edDate" inputmode="numeric" autocomplete="off" placeholder="MM/DD/YYYY">
        <label for="edClub">Club / Shoot</label>
        <input id="edClub" autocomplete="off" placeholder="Club or shoot name">
        <div class="gauge-list" id="editGaugeList"></div>
        <div class="btn-row">
          <button class="act primary" id="btnUpdate">Update</button>
          <button class="act ghost" id="btnEditCancel">Cancel</button>
        </div>
        <button class="del-link" id="btnDeleteEntry">Delete this entry</button>
        <div class="status" id="editStatus"></div>
      </div>
    </section>
  </main>

  <!-- USER PROFILE DIALOG -->
  <div class="overlay" id="userOverlay">
    <div class="modal">
      <h2 id="userTitle">Profile</h2>
      <label for="uName">Name</label>
      <input id="uName" autocomplete="off">
      <label for="uNssa">NSSA #</label>
      <input id="uNssa" autocomplete="off" inputmode="numeric">
      <label for="uState">State #</label>
      <input id="uState" autocomplete="off">
      <div class="modal-btns">
        <button class="b-primary" id="uSave">Save</button>
        <button class="b-ghost" id="uCancel">Cancel</button>
      </div>
      <button class="del-link" id="btnDelUser" style="display:none">Delete this shooter &amp; history</button>
    </div>
  </div>

  <!-- AUTH GATE -->
  <div class="overlay" id="authOverlay">
    <div class="modal">
      <h2>Sign In</h2>
      <p class="intro">Sign in to sync your scores across your devices. Each shooter has their own account and private records.</p>
      <label for="authEmail">Email</label>
      <input id="authEmail" type="email" autocomplete="username" autocapitalize="off" spellcheck="false">
      <label for="authPass">Password</label>
      <input id="authPass" type="password" autocomplete="current-password">
      <div id="authMsg" class="msg"></div>
      <div class="modal-btns">
        <button class="b-primary" id="authSignIn">Sign In</button>
        <button class="b-ghost" id="authSignUp">Create Account</button>
      </div>
      <div class="modal-links"><a href="#" id="authReset">Forgot password?</a></div>
    </div>
  </div>

<script>
"use strict";
/* =====================================================================
   CORE LOGIC — identical to Skeet Tracker so both apps share the same
   data, storage keys, classification math, and cloud format.
   ===================================================================== */
const GAUGES = ["12 Gauge","20 Gauge","28 Gauge",".410 Bore","Doubles"];
const HOA_GAUGES = ["12 Gauge","20 Gauge","28 Gauge",".410 Bore"];
const ROLLING_EVENTS = 5;
const NSSA_TABLE = {
  "12 Gauge":  [["AAA",0.9850],["AA",0.9750],["A",0.9600],["B",0.9350],["C",0.9000],["D",0.8550],["E",0.0]],
  "20 Gauge":  [["AAA",0.9825],["AA",0.9700],["A",0.9450],["B",0.9100],["C",0.8550],["D",0.0]],
  "28 Gauge":  [["AAA",0.9800],["AA",0.9650],["A",0.9400],["B",0.9050],["C",0.8550],["D",0.0]],
  ".410 Bore": [["AAA",0.9650],["AA",0.9450],["A",0.9100],["B",0.8600],["C",0.8000],["D",0.0]],
  "Doubles":   [["AAA",0.9700],["AA",0.9500],["A",0.9100],["B",0.8500],["C",0.8000],["D",0.0]],
  "HOA":       [["AAA",0.9781],["AA",0.9638],["A",0.9388],["B",0.9025],["C",0.8525],["D",0.7925],["E",0.0]],
  "HOA500":    [["AAA",0.9764],["AA",0.9610],["A",0.9330],["B",0.8920],["C",0.8420],["D",0.7820],["E",0.0]],
};

/* ---- Storage (same keys as Skeet Tracker) ---- */
const USERS_KEY  = "skeet_users_v1";
const ACTIVE_KEY = "skeet_active_user_v1";
function recordsKey(id){ return "skeet_records_v1::" + id; }
let DB = [];
let nextId = 1;
let users = [];
let activeUserId = null;

function newUserId(){ return "u" + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function activeUser(){ return users.find(u => u.id === activeUserId) || null; }
function hasUsers(){ return users.length > 0; }

function loadUsers(){
  try{ users = JSON.parse(localStorage.getItem(USERS_KEY) || "[]"); }catch(e){ users = []; }
  if(!Array.isArray(users)) users = [];
  try{ activeUserId = localStorage.getItem(ACTIVE_KEY) || null; }catch(e){ activeUserId = null; }
  if(users.length === 0){
    let prof=null, recs=null;
    try{ prof = JSON.parse(localStorage.getItem("skeet_user_v1") || "null"); }catch(e){}
    try{ recs = JSON.parse(localStorage.getItem("skeet_records_v1") || "null"); }catch(e){}
    const hadProf = prof && (prof.name||prof.nssa||prof.state);
    const hadRecs = Array.isArray(recs) && recs.length;
    if(hadProf || hadRecs){
      const id = newUserId();
      users = [{id, name:(prof&&prof.name)||"", nssa:(prof&&prof.nssa)||"", state:(prof&&prof.state)||""}];
      activeUserId = id;
      try{ if(Array.isArray(recs)) localStorage.setItem(recordsKey(id), JSON.stringify(recs)); }catch(e){}
      saveUsers();
      try{ localStorage.removeItem("skeet_records_v1"); localStorage.removeItem("skeet_user_v1"); }catch(e){}
    }
  }
  if(users.length && (!activeUserId || !users.some(u=>u.id===activeUserId)))
    activeUserId = users[0].id;
}
function saveUsers(){
  try{
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
    if(activeUserId) localStorage.setItem(ACTIVE_KEY, activeUserId);
  }catch(e){}
  markDirty();
}
function loadDB(){
  DB = [];
  if(activeUserId){
    try{ const raw = localStorage.getItem(recordsKey(activeUserId)); DB = raw ? JSON.parse(raw) : []; }
    catch(e){ DB = []; }
  }
  if(!Array.isArray(DB)) DB = [];
  let mx = 0;
  for(const r of DB){ if(typeof r.id!=="number"){ r.id = ++mx; } else { mx=Math.max(mx,r.id);} }
  nextId = mx + 1;
}
function saveDB(){
  if(!activeUserId) return;
  try{ localStorage.setItem(recordsKey(activeUserId), JSON.stringify(DB)); }
  catch(e){ setStatus("Can't save on this browser (won't persist).", true); }
  markDirty();
}
function addRecord(rec){ rec.id = nextId++; DB.push(rec); }
function recordExists(dateISO, club, gauge){
  return DB.some(r => r.date===dateISO && r.club===club && r.gauge===gauge);
}

/* ---- Date helpers ---- */
function toISO(mdy){
  const m = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec((mdy||"").trim());
  if(!m) return "";
  const mo=+m[1], d=+m[2], y=+m[3];
  if(mo<1||mo>12||d<1||d>31) return "";
  return `${y}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}
function toMDY(iso){
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso||"");
  return m ? `${m[2]}/${m[3]}/${m[1]}` : (iso||"");
}
function yearOf(iso){ return (iso||"").slice(0,4); }
function curYear(){ return String(new Date().getFullYear()); }

/* ---- Classification ---- */
function classFromAvg(gauge, avg){
  if(avg===null||avg===undefined) return "";
  for(const [cls,low] of (NSSA_TABLE[gauge]||[])) if(avg>=low) return cls;
  return "";
}
function classify(gauge, shot, broke){
  const s=parseInt(shot,10), b=parseInt(broke,10);
  if(isNaN(s)||isNaN(b)||s<=0||b<0||b>s) return "";
  return classFromAvg(gauge, b/s);
}
function classOrder(gauge){ return (NSSA_TABLE[gauge]||[]).map(x=>x[0]); }
function previousYearAverage(gauge, year){
  const priorYears = DB.filter(r=>r.gauge===gauge && yearOf(r.date)<String(year)).map(r=>yearOf(r.date));
  if(!priorYears.length) return null;
  const py = priorYears.sort().reverse()[0];
  let ts=0, tb=0, any=false;
  for(const r of DB){
    if(r.gauge===gauge && yearOf(r.date)===py){ ts += r.shot||0; tb += (r.broke==null?0:r.broke); any=true; }
  }
  if(!any || ts===0) return null;
  return tb/ts;
}
function priorYearStartClass(gauge, year){ return classFromAvg(gauge, previousYearAverage(gauge, year)) || ""; }
function declaredFloor(gauge, year){
  const decl = DB.filter(r=>r.gauge===gauge && r.declared
                            && yearOf(r.date)===String(year)
                            && classOrder(gauge).includes(r.class_shot))
                 .sort(cmpRec);
  return decl.length ? decl[decl.length-1].class_shot : "";
}
function classEntering(gauge, year){
  const scored = DB.filter(r=>r.gauge===gauge && (r.shot||0)>0).sort(cmpRec);
  let cls;
  if(scored.length){
    const last = scored[scored.length-1];
    const c = computeHistory()[last.date+"|"+last.club+"|"+gauge];
    cls = (c && c.class_next) ? c.class_next : "";
  }else{
    cls = priorYearStartClass(gauge, year);
  }
  return applyFloor(gauge, cls, declaredFloor(gauge, year));
}
function rollingAvg(events){
  const w = events.slice(-ROLLING_EVENTS);
  let s=0,b=0; for(const e of w){ s+=e[0]; b+=e[1]; }
  return s? b/s : null;
}
function applyFloor(gauge, cls, floorCls){
  const order = classOrder(gauge);
  if(!order.includes(cls)||!floorCls||!order.includes(floorCls)) return cls;
  return order[Math.min(order.indexOf(cls), order.indexOf(floorCls))];
}
function determineClassNext(gauge, currentClass, shot, broke, year){ return classify(gauge, shot, broke); }
function cmpRec(a,b){ if(a.date<b.date) return -1; if(a.date>b.date) return 1; return (a.id||0)-(b.id||0); }

function computeFromRecords(raw){
  const events={}, dfloor={}, out={};
  const runningNext={}, yearFloor={};
  for(const r of raw){
    const d=r.date, c=r.club, g=r.gauge;
    if(!d || d.length<4) continue;
    const yr=d.slice(0,4);
    const s = (r.shot==null? null : r.shot);
    const b = (r.broke==null? 0 : r.broke);
    const valid = (typeof s==="number" && s>0);
    const order = classOrder(g);
    const prev = events[g]||[];
    let csRaw = prev.length ? classFromAvg(g, rollingAvg(prev)) : priorYearStartClass(g, yr);
    const yk = g+"|"+yr;
    let yf = yearFloor[g];
    if(!yf || yf.year !== yr){
      let entering = (runningNext[g] && order.includes(runningNext[g])) ? runningNext[g] : "";
      if(!entering && order.includes(r.class_shot)) entering = r.class_shot;
      const floorCls = order.includes(entering) ? order[Math.min(order.indexOf(entering)+1, order.length-1)] : "";
      yf = {year:yr, floor:floorCls, entering};
      yearFloor[g] = yf;
    }
    const ydf = yf.floor;
    let classShot = applyFloor(g, csRaw, dfloor[yk]);
    if(r.declared && order.includes(r.class_shot)){
      const ni = order.indexOf(csRaw);
      const di = order.indexOf(r.class_shot);
      if(ni < 0 || di < ni){ classShot = r.class_shot; dfloor[yk] = r.class_shot; }
    }
    classShot = applyFloor(g, classShot, ydf);
    let avg=null, classNext;
    if(valid){
      (events[g]=events[g]||[]).push([s,b]);
      avg = rollingAvg(events[g]);
      classNext = applyFloor(g, applyFloor(g, classFromAvg(g,avg), dfloor[yk]), ydf);
    }else{
      classNext = classShot;
    }
    if(order.includes(classNext)) runningNext[g] = classNext;
    out[d+"|"+c+"|"+g] = {class_shot:classShot, avg, class_next:classNext, floor:dfloor[yk]||""};
  }
  return out;
}
function computeHistory(){ return computeFromRecords([...DB].sort(cmpRec)); }

function currentSummary(){
  const comp = computeHistory();
  const out = {};
  for(const g of GAUGES){
    const scored = DB.filter(r=>r.gauge===g && (r.shot||0)>0).sort(cmpRec);
    if(scored.length){
      const last = scored[scored.length-1];
      const c = comp[last.date+"|"+last.club+"|"+g];
      out[g] = [c ? c.avg : null, classEntering(g, curYear())];
    } else out[g] = [null,""];
  }
  return out;
}
function hoaAverage(){
  let totShot=0, totBroke=0, guns=0;
  for(const g of HOA_GAUGES){
    const scored = DB.filter(r=>r.gauge===g && (r.shot||0)>0).sort(cmpRec);
    if(!scored.length) continue;
    let s=0,b=0;
    for(const r of scored.slice(-ROLLING_EVENTS)){ s+=r.shot||0; b+=(r.broke==null?0:r.broke); }
    totShot+=s; totBroke+=b; guns++;
  }
  return { avg: totShot? totBroke/totShot : null, guns };
}
function hoa500Average(){
  let totShot=0, totBroke=0, guns=0;
  for(const g of GAUGES){
    const scored = DB.filter(r=>r.gauge===g && (r.shot||0)>0).sort(cmpRec);
    if(!scored.length) continue;
    let s=0,b=0;
    for(const r of scored.slice(-ROLLING_EVENTS)){ s+=r.shot||0; b+=(r.broke==null?0:r.broke); }
    totShot+=s; totBroke+=b; guns++;
  }
  return { avg: totShot? totBroke/totShot : null, guns };
}

function doSave(){
  const dRaw = document.getElementById("inDate").value.trim();
  const club = document.getElementById("inClub").value.trim();
  if(!dRaw || !club){ setStatus("Date and Club / Shoot are required.", true); return; }
  const iso = toISO(dRaw);
  if(!iso){ setStatus("Date must be MM/DD/YYYY.", true); return; }
  const yr = iso.slice(0,4);
  let saved=0; const errors=[];
  for(const g of GAUGES){
    const cs = gv(g,"class").value.trim();
    const sR = gv(g,"shot").value.trim();
    const bR = gv(g,"broke").value.trim();
    if(sR==="" && bR===""){ continue; }            // blank gauge: leave any existing record untouched
    const s=parseInt(sR,10), b=parseInt(bR,10);
    if(isNaN(s)||isNaN(b)){ errors.push(`${g}: Shot/Broke must be whole numbers.`); continue; }
    if(b>s){ errors.push(`${g}: Broke (${b}) > Shot (${s}).`); continue; }
    if(s<0||b<0){ errors.push(`${g}: Values must be positive.`); continue; }
    const calc = classEntering(g, yr);
    const declared = (cs && cs!==calc) ? 1 : 0;
    // Upsert: replace any existing record for this date+club+gauge.
    DB = DB.filter(r => !(r.date===iso && r.club===club && r.gauge===g));
    const cn = determineClassNext(g, cs, s, b, yr);
    addRecord({date:iso, club, gauge:g, class_shot:cs, shot:s, broke:b, class_next:cn, declared});
    saved++;
  }
  if(errors.length){ setStatus(errors.join("  "), true); }
  if(saved){
    saveDB();
    doClear();
    refreshAll();
    renderEditSelect();
    if(!errors.length) setStatus(`Saved ${saved} score${saved>1?"s":""}.`, false);
  }else if(!errors.length){
    setStatus("Enter a Shot/Broke for at least one gauge.", true);
  }
}

    if(!map.has(key)) map.set(key, {date:r.date, club:r.club, key});
  }
  return [...map.values()].sort((a,b)=>
    a.date<b.date?-1 : a.date>b.date?1 :
    (a.club.toLowerCase()<b.club.toLowerCase()?-1 : a.club.toLowerCase()>b.club.toLowerCase()?1 : 0));
}

function doUpdateEntry(){
  if(!editKey) return;
  const dRaw = document.getElementById("edDate").value.trim();
  const club = document.getElementById("edClub").value.trim();
  if(!dRaw || !club){ setEditStatus("Date and Club / Shoot are required.", true); return; }
  const iso = toISO(dRaw);
  if(!iso){ setEditStatus("Date must be MM/DD/YYYY.", true); return; }
  const yr = iso.slice(0,4);
  const errors=[]; const newRecs=[];
  for(const g of GAUGES){
    const sR = egv(g,"shot").value.trim();
    const bR = egv(g,"broke").value.trim();
    if(sR==="" && bR===""){ continue; }          // cleared gauge -> dropped from the session
    const s=parseInt(sR,10), b=parseInt(bR,10);
    if(isNaN(s)||isNaN(b)){ errors.push(`${g}: whole numbers required.`); continue; }
    if(b>s){ errors.push(`${g}: Broke (${b}) > Shot (${s}).`); continue; }
    if(s<0||b<0){ errors.push(`${g}: values must be positive.`); continue; }
    const orig = editOriginal.find(r=>r.gauge===g);
    const cls = orig ? (orig.class_shot||"") : classEntering(g, yr);
    const declared = orig ? (orig.declared?1:0) : ((cls && cls!==classEntering(g, yr)) ? 1 : 0);
    const cn = determineClassNext(g, cls, s, b, yr);
    newRecs.push({date:iso, club, gauge:g, class_shot:cls, shot:s, broke:b, class_next:cn, declared});
  }
  if(errors.length){ setEditStatus(errors.join("  "), true); return; }
  if(!newRecs.length){ setEditStatus("Enter at least one gauge, or use Delete.", true); return; }
  const [oldDate,oldClub] = editKey.split("|");
  // Remove the original session and anything already at the new date+club, then add.
  DB = DB.filter(r => !((r.date===oldDate && r.club===oldClub) || (r.date===iso && r.club===club)));
  for(const rec of newRecs) addRecord(rec);
  saveDB(); prefillClasses(); refreshAll(); renderEditSelect();

/* =====================================================================
   CLOUD SYNC BRIDGE — identical contract & data format to Skeet Tracker
   ===================================================================== */
const CLOUD_PREFIX = "skeet_";
let cloudActive = false, cloudSignedIn = false, applyingRemote = false;
let cloudResolved = false;        // have we reached a point where a profile decision is valid?
let cloudFirstSnapshot = false;   // first Firestore snapshot has been applied
let cloudResolveTries = 0;
function cloudGather(){
  const store = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.indexOf(CLOUD_PREFIX)===0) store[k] = localStorage.getItem(k);
  }
  return store;
}
function wipeLocalData(){
  const keys = [];
  for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.indexOf(CLOUD_PREFIX)===0) keys.push(k); }
  for(const k of keys) localStorage.removeItem(k);
}
function reloadFromStorage(){
  loadUsers(); loadDB();
  renderUserBar(); prefillClasses(); refreshAll(); renderEditSelect();
}
function cloudApply(store){
  applyingRemote = true;
  try{
    wipeLocalData();
    for(const k in (store||{})) localStorage.setItem(k, store[k]);
    reloadFromStorage();
  } finally { applyingRemote = false; }
}
function cloudReset(){
  applyingRemote = true;
  try{ wipeLocalData(); reloadFromStorage(); }
  finally { applyingRemote = false; }
}
function markDirty(){
  if(applyingRemote) return;
  if(window.SkeetCloud && window.SkeetCloud.markDirty) window.SkeetCloud.markDirty();
}
function cloudStatus(state, text){
  const dot = document.getElementById("cloudStatus");
  const lbl = document.getElementById("cloudStatusText");
  if(dot){ dot.className = "cloud-dot " + (state||""); dot.title = text||state||""; }
  if(lbl) lbl.textContent = text || "";
}
function maybeFirstUse(){
  if(!cloudResolved) return;                  // wait for the cloud's first sync / verdict
  if(cloudActive && !cloudSignedIn) return;   // signed out: the sign-in gate handles it first
  if(!hasUsers()) openUserDialog("first");
}
// Called after the first cloud snapshot is applied for a signed-in shooter.
function cloudReady(){ cloudFirstSnapshot = true; cloudResolved = true; maybeFirstUse(); }
// Backstop: if the cloud never reports in (offline / module failed), decide locally.
// While signed in and still waiting for the first snapshot, keep waiting a bit longer.
function resolveCloud(){
  if(cloudResolved) return;
  if(cloudActive && cloudSignedIn && !cloudFirstSnapshot && cloudResolveTries < 2){
    cloudResolveTries++;
    setTimeout(resolveCloud, 5000);
    return;
  }
  cloudResolved = true;
  maybeFirstUse();
}
function cloudAuthChanged(user){
  const wasSignedIn = cloudSignedIn;
  cloudSignedIn = !!user;
  const emailEl = document.getElementById("cloudEmail");
  const signOutBtn = document.getElementById("btnSignOut");
  const overlay = document.getElementById("authOverlay");
  const msg = document.getElementById("authMsg");
  if(user){
    if(emailEl) emailEl.textContent = user.email || "";
    if(signOutBtn) signOutBtn.style.display = "";
    if(msg) msg.textContent = "";
    if(overlay) overlay.classList.remove("show");
  }else{
    if(emailEl) emailEl.textContent = "";
    if(signOutBtn) signOutBtn.style.display = "none";
    cloudFirstSnapshot = false;
    if(wasSignedIn) cloudReset();      // only wipe on a real sign-out, never on first load
    cloudStatus("offline", wasSignedIn ? "Signed out" : "Not signed in");
    if(overlay) overlay.classList.add("show");
  }
}
function friendlyAuthError(e){
  const c = (e && e.code) || "";
  if(c.includes("invalid-credential")||c.includes("wrong-password")||c.includes("user-not-found")) return "Email or password is incorrect.";
  if(c.includes("email-already-in-use")) return "That email already has an account \u2014 try signing in.";
  if(c.includes("weak-password")) return "Password should be at least 6 characters.";
  if(c.includes("invalid-email")) return "Please enter a valid email address.";
  if(c.includes("network")) return "Network error \u2014 check your connection.";
  return (e && e.message) || "Something went wrong.";
}
function wireAuthUI(){
  const email = ()=>document.getElementById("authEmail").value.trim();
  const pass  = ()=>document.getElementById("authPass").value;
  const msg   = (t,err)=>{ const m=document.getElementById("authMsg"); if(m){ m.textContent=t||""; m.className="msg"+(err?" err":""); } };
  document.getElementById("authSignIn").onclick = ()=>{
    if(!window.SkeetCloud) return;
    if(!email()||!pass()){ msg("Enter your email and password.", true); return; }
    msg("Signing in\u2026");
    window.SkeetCloud.signIn(email(), pass()).catch(e=>msg(friendlyAuthError(e), true));
  };
  document.getElementById("authSignUp").onclick = ()=>{
    if(!window.SkeetCloud) return;
    if(!email()||!pass()){ msg("Enter an email and a password (6+ characters).", true); return; }
    msg("Creating account\u2026");
    window.SkeetCloud.signUp(email(), pass()).catch(e=>msg(friendlyAuthError(e), true));
  };
  document.getElementById("authReset").onclick = (ev)=>{
    ev.preventDefault();
    if(!window.SkeetCloud) return;
    if(!email()){ msg("Enter your email above first, then tap reset.", true); return; }
    window.SkeetCloud.resetPassword(email()).then(()=>msg("Password reset email sent.")).catch(e=>msg(friendlyAuthError(e), true));
  };
  const so = document.getElementById("btnSignOut");
  if(so) so.onclick = ()=>{ if(window.SkeetCloud) window.SkeetCloud.signOut(); };
}
function startCloud(){
  if(window.__cloudStarted) return;
  if(!window.SkeetCloud) return;
  window.__cloudStarted = true;
  cloudActive = true;
  // Don't show the sign-in prompt yet. Wait until auth/sync resolves so a
  // signed-in shooter never sees a sign-in flash on launch; cloudAuthChanged()
  // shows the prompt only if the shooter turns out to be signed out.
  cloudStatus("syncing","Connecting\u2026");
  window.SkeetCloud.start({
    gather: cloudGather, apply: cloudApply, reset: cloudReset,
    authChanged: cloudAuthChanged, status: cloudStatus, ready: cloudReady
  });
}

/* ---- Init ---- */
function init(){
  // default date = today
  const t = new Date();
  document.getElementById("inDate").value =
    `${String(t.getMonth()+1).padStart(2,"0")}/${String(t.getDate()).padStart(2,"0")}/${t.getFullYear()}`;

  buildGaugeInputs();
  buildEditGaugeInputs();

  document.getElementById("btnUpdate").onclick = doUpdateEntry;
  document.getElementById("btnDeleteEntry").onclick = doDeleteEntry;
  document.getElementById("btnEditCancel").onclick = ()=>{
    document.getElementById("editSelect").value = "";
    loadEditForm("");
  };
  document.getElementById("userSelect").addEventListener("change", e=>switchUser(e.target.value));
  document.getElementById("btnAddUser").onclick  = ()=>openUserDialog("add");
  document.getElementById("btnEditUser").onclick = ()=>openUserDialog("edit");
  document.getElementById("uSave").onclick   = saveUserDialog;
  document.getElementById("uCancel").onclick = ()=>document.getElementById("userOverlay").classList.remove("show");
  document.getElementById("btnDelUser").onclick = deleteActiveUser;

  cloudActive = !!window.SkeetCloud;
  // Decide whether a User Profile is required only AFTER the cloud has had a
  // chance to synchronize (first snapshot), or is confirmed unavailable.
  window.addEventListener("skeetcloud:unavailable", ()=>{ cloudActive=false; resolveCloud(); });

  wireAuthUI();
  startCloud();
  window.addEventListener("skeetcloud:ready", startCloud);
  setTimeout(resolveCloud, 5000);   // backstop if the cloud never reports in
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(e=>console.warn("SW:",e));
  }
}
document.addEventListener("DOMContentLoaded", init);
</script>

  messagingSenderId: "272660645787",
  appId: "1:272660645787:web:0c18e2ffde924b9242033e"
};

try {
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  let db;
  try {
    db = initializeFirestore(app, { localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }) });
  } catch (e) {
    const { getFirestore } = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js");
    db = getFirestore(app);
  }
  setPersistence(auth, browserLocalPersistence).catch(()=>{});

  let deviceId = localStorage.getItem("sktDeviceId");
  if(!deviceId){ deviceId = "d"+Math.random().toString(36).slice(2)+Date.now().toString(36);
    try{ localStorage.setItem("sktDeviceId", deviceId); }catch(e){} }

  let hooks=null, currentUser=null, unsub=null, firstDone=false, pushTimer=null;
  function status(state, text){ if(hooks && hooks.status) hooks.status(state, text); }

  async function pushNow(store){
    if(!currentUser) return;
    try{
      await setDoc(doc(db, "shooters", currentUser.uid), {
        storeJson: JSON.stringify(store || {}), origin: deviceId, updatedAt: serverTimestamp(), v: 1
      });
    }catch(e){ console.error("[cloud] push failed", e); status("error", "Sync error"); }
  }
  function markDirty(){
    if(!currentUser || !hooks) return;
    status("syncing", "Saving\u2026");
    clearTimeout(pushTimer);
    pushTimer = setTimeout(()=>{ pushNow(hooks.gather()); }, 1200);
  }
  function handleSnapshot(snap){
    const pending = snap.metadata.hasPendingWrites;
    if(snap.exists()){
      const data = snap.data() || {};
      if(data.origin !== deviceId && !pending){
        try{ hooks.apply(JSON.parse(data.storeJson || "{}")); }catch(e){ console.error("[cloud] apply failed", e); }
      }
      status(pending ? "syncing" : (snap.metadata.fromCache ? "offline" : "synced"),
             pending ? "Saving\u2026" : (snap.metadata.fromCache ? "Offline" : "Synced"));
    }else{
      const store = hooks.gather();
      if(Object.keys(store).length) pushNow(store);
      status(snap.metadata.fromCache ? "offline" : "synced", snap.metadata.fromCache ? "Offline" : "Synced");
    }
    if(!firstDone){ firstDone = true; if(hooks.ready) hooks.ready(); }
  }
  function start(h){
    hooks = h;
    onAuthStateChanged(auth, (user)=>{
      currentUser = user; firstDone = false;
      if(unsub){ unsub(); unsub = null; }
      hooks.authChanged(user);
      if(user){
        status("syncing", "Connecting\u2026");
        unsub = onSnapshot(doc(db, "shooters", user.uid), { includeMetadataChanges: true },
                           handleSnapshot, (err)=>{ console.error("[cloud] snapshot error", err); status("error","Sync error"); });
      }
    });
  }
  window.addEventListener("online",  ()=>{ if(currentUser) status("syncing","Reconnecting\u2026"); });
  window.addEventListener("offline", ()=>{ if(currentUser) status("offline","Offline"); });

  window.SkeetCloud = {
    start, markDirty,
    signIn:        (email, pw)=> signInWithEmailAndPassword(auth, email, pw),
    signUp:        (email, pw)=> createUserWithEmailAndPassword(auth, email, pw),
    resetPassword: (email)    => sendPasswordResetEmail(auth, email),
    signOut:       ()         => signOut(auth)
  };
  window.dispatchEvent(new Event("skeetcloud:ready"));
} catch (e) {
  console.error("[cloud] Firebase failed to initialize \u2014 running local-only.", e);
  window.dispatchEvent(new Event("skeetcloud:unavailable"));
}
</script>
</body>
</html>
