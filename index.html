<script>
  (function(){
    var ua = navigator.userAgent || "";
    var phone = /Android|iPhone|iPod|webOS|BlackBerry|IEMobile|Opera Mini|Windows Phone|Mobile/i.test(ua);
    var smallTouch = ("ontouchstart" in window) &&
                     Math.min(screen.width || 9999, screen.height || 9999) <= 820;
    var isMobile = phone || smallTouch;
    var forced = null;
    try { forced = new URLSearchParams(location.search).get("app"); } catch(e){}
    if(forced === "desktop") isMobile = false;
    if(forced === "mobile")  isMobile = true;
    var dest = isMobile ? "skeet_mobile.html" : "desktop.html";
    location.replace(dest + (location.hash || ""));
  })();
</script>
